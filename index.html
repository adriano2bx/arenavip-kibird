<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Espera Arena KI-BIRD</title>
    
    <!-- Tailwind CSS (Script para compilação em tempo real no navegador) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Para compilar o JSX direto no navegador) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Ajuste fino para inputs não perderem a cor de fundo por causa de autofill do navegador */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px white inset !important;
        }
    </style>
</head>
<body class="bg-[#343a40]">
    <!-- Contêiner principal do React -->
    <div id="root"></div>

    <!-- Script principal em Babel (React) -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Ícones em formato de componentes funcionais (Substituindo dependência externa)
        const Check = ({ size = 24, className = "", strokeWidth = 2 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        );

        const ArrowRight = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        );

        const ArrowLeft = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        );

        // Componente Principal da Aplicação
        const App = () => {
            const [isStarted, setIsStarted] = useState(false);
            const [currentStep, setCurrentStep] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [errors, setErrors] = useState({});
            const [formData, setFormData] = useState({
                firstName: '',
                lastName: '',
                email: '',
                whatsapp: '',
                instagram: '',
                age: '',
                profession: '',
                referredBy: '',
                experience: [],
                englishLevel: '',
                reason: '',
                terms: []
            });

            const WEBHOOK_URL = 'https://n8n-webhook.urusjw.easypanel.host/webhook/arena-vip';
            const LOGO_URL = 'https://cdn.prod.website-files.com/691f6586275f2becf88589e8/691f87d3e9eb72a34b1fe5ad_logo-ki-bird-english.png';

            const steps = [
                { id: 'name', title: 'Como você se chama?', type: 'name', fields: [{ name: 'firstName', label: 'Nome', placeholder: 'Nome' }, { name: 'lastName', label: 'Sobrenome', placeholder: 'Sobrenome' }] },
                { id: 'email', title: 'Email', type: 'input', inputType: 'email', name: 'email', sublabel: 'exemplo@email.com' },
                { id: 'whatsapp', title: 'WhatsApp', subtitle: 'Precisaremos de seu whatsapp para o grupo', type: 'input', inputType: 'tel', name: 'whatsapp', sublabel: 'Por favor, insira um número de telefone válido com DDD.', placeholder: '(00) 00000-0000' },
                { id: 'instagram', title: 'Qual seu instagram?', subtitle: 'Para que possamos te marcar nas publicações', type: 'input', inputType: 'text', name: 'instagram', placeholder: '@seuusuario', optional: true },
                { id: 'age', title: 'Idade', type: 'input', inputType: 'number', name: 'age', sublabel: 'Ex: 23' },
                { id: 'profession', title: 'Profissão', type: 'input', inputType: 'text', name: 'profession' },
                { id: 'referredBy', title: 'Indicado(a) por:', subtitle: 'Como nos conheceu', type: 'input', inputType: 'text', name: 'referredBy' },
                { id: 'experience', title: 'Qual é a sua experiência com o inglês?', type: 'checkbox', name: 'experience', options: ['Fiz curso de inglês no passado', 'Já viajei pra fora e usei inglês na prática', 'Estudei sozinho(a), com apps ou vídeos', 'Já fiz aula particular', 'Estudei na escola, mas faz tempo', 'Nunca estudei inglês'] },
                { id: 'englishLevel', title: 'Como você considera seu nível atual de inglês?', subtitle: 'Escolha a opção que mais se aproxima de sua realidade', type: 'radio', name: 'englishLevel', options: [{ label: 'Não sei nada ou quase nada (Nível 0)', value: '0' }, { label: 'Básico: frases simples e dia a dia', value: 'basico' }, { label: 'Intermediário: me viro com ajuda', value: 'intermediario' }, { label: 'Avançado: converso com naturalidade', value: 'avancado' }] },
                { id: 'reason', title: 'Por qual motivo você quer melhorar seu inglês?', type: 'radio', name: 'reason', options: [{ label: 'Desenvolvimento pessoal', value: 'pessoal' }, { label: 'Viagens', value: 'viagens' }, { label: 'Desenvolvimento profissional', value: 'profissional' }] },
                { id: 'terms', title: 'Estou ciente que:', type: 'checkbox', name: 'terms', requireAll: true, options: ['A preparação com os materiais é fundamental.', 'As práticas serão em grupo.', 'Vagas LIMITADAS (lista de espera).', 'As sessões serão gravadas.', 'Aceito receber contato via WhatsApp.'] }
            ];

            const totalSteps = steps.length;

            const maskPhone = (value) => {
                let v = value.replace(/\D/g, '');
                if (v.length <= 10) {
                    v = v.replace(/(\d{2})(\d)/, '($1) $2');
                    v = v.replace(/(\d{4})(\d)/, '$1-$2');
                } else {
                    v = v.replace(/(\d{2})(\d)/, '($1) $2');
                    v = v.replace(/(\d{5})(\d{1,4})/, '$1-$2');
                }
                return v.substring(0, 15);
            };

            const handleInputChange = (e) => {
                let { name, value } = e.target;
                
                if (name === 'whatsapp') {
                    value = maskPhone(value);
                }

                setFormData(prev => ({ ...prev, [name]: value }));
                if (errors[name]) setErrors(prev => ({ ...prev, [name]: null }));
            };

            const handleCheckboxChange = (option, fieldName) => {
                setFormData(prev => {
                    const currentValues = prev[fieldName] || [];
                    return currentValues.includes(option) ? { ...prev, [fieldName]: currentValues.filter(v => v !== option) } : { ...prev, [fieldName]: [...currentValues, option] };
                });
                if (errors[fieldName]) setErrors(prev => ({ ...prev, [fieldName]: null }));
            };

            const handleRadioChange = (value, fieldName) => {
                setFormData(prev => ({ ...prev, [fieldName]: value }));
                if (errors[fieldName]) setErrors(prev => ({ ...prev, [fieldName]: null }));
            };

            const validateStep = () => {
                const step = steps[currentStep];
                const newErrors = {};
                let isValid = true;

                if (step.type === 'name') {
                    if (!formData.firstName.trim()) { newErrors.firstName = 'Este campo é obrigatório.'; isValid = false; }
                    if (!formData.lastName.trim()) { newErrors.lastName = 'Este campo é obrigatório.'; isValid = false; }
                } else if (step.type === 'input' && !step.optional) {
                    if (!formData[step.name].trim()) {
                        newErrors[step.name] = 'Este campo é obrigatório.';
                        isValid = false;
                    } else if (step.inputType === 'email') {
                        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        if (!emailRegex.test(formData[step.name])) {
                            newErrors[step.name] = 'Insira um endereço de e-mail válido.';
                            isValid = false;
                        }
                    } else if (step.name === 'whatsapp') {
                        const digits = formData.whatsapp.replace(/\D/g, '');
                        if (digits.length < 10) {
                            newErrors.whatsapp = 'Insira um número de telefone válido com DDD.';
                            isValid = false;
                        }
                    } else if (step.name === 'age') {
                        if (isNaN(formData.age) || Number(formData.age) <= 0) {
                            newErrors.age = 'Insira uma idade válida.';
                            isValid = false;
                        }
                    }
                } else if (step.type === 'checkbox') {
                    if (step.requireAll) {
                        if (!formData[step.name] || formData[step.name].length !== step.options.length) {
                            newErrors[step.name] = 'É obrigatório assinalar todas as opções para continuar.';
                            isValid = false;
                        }
                    } else if (!formData[step.name] || formData[step.name].length === 0) {
                        newErrors[step.name] = 'Este campo é obrigatório. Selecione pelo menos uma opção.';
                        isValid = false;
                    }
                } else if (step.type === 'radio') {
                    if (!formData[step.name]) {
                        newErrors[step.name] = 'Este campo é obrigatório.';
                        isValid = false;
                    }
                }

                setErrors(newErrors);
                return isValid;
            };

            const nextStep = () => {
                if (validateStep()) {
                    if (currentStep < totalSteps - 1) setCurrentStep(prev => prev + 1);
                    else submitForm();
                }
            };

            const prevStep = () => {
                setErrors({});
                if (currentStep > 0) setCurrentStep(prev => prev - 1);
            };

            const isStepComplete = (index) => {
                const step = steps[index];
                if (step.type === 'name') return formData.firstName.trim() !== '' && formData.lastName.trim() !== '';
                if (step.type === 'input') return step.optional || formData[step.name].trim() !== '';
                if (step.type === 'checkbox') {
                    if (step.requireAll) return formData[step.name] && formData[step.name].length === step.options.length;
                    return formData[step.name] && formData[step.name].length > 0;
                }
                if (step.type === 'radio') return formData[step.name] && formData[step.name] !== '';
                return false;
            };

            const submitForm = async () => {
                setIsSubmitting(true);
                try {
                    await fetch(WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...formData, submittedAt: new Date().toISOString() }),
                    });
                    setIsSubmitted(true);
                } catch (error) {
                    alert('Erro ao enviar. Tente novamente.');
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    nextStep();
                }
            };

            if (!isStarted) {
                return (
                    <div className="min-h-screen bg-[#343a40] flex items-center justify-center p-4">
                        <div className="bg-[#001524] w-full max-w-2xl rounded-lg overflow-hidden shadow-2xl flex flex-col items-center text-center p-12 border border-white/5">
                            <img src={LOGO_URL} alt="Logo" className="h-16 mb-8" />
                            <h1 className="text-white text-2xl md:text-3xl font-bold mb-4 tracking-wide uppercase">LISTA DE ESPERA ARENA KI-BIRD</h1>
                            <p className="text-slate-300 text-lg mb-10 max-w-lg leading-relaxed">Você foi contemplado(a) com um convite para participar da ARENA KI-BIRD. Inscreva-se gratuitamente!</p>
                            <div className="text-slate-500 text-sm mb-12"><strong>11</strong> Perguntas</div>
                            <button onClick={() => setIsStarted(true)} className="w-full bg-[#00E581] hover:bg-[#00c978] text-white font-bold py-5 px-8 rounded flex items-center justify-center gap-3 transition-all text-xl uppercase tracking-wider">
                                QUERO PARTICIPAR <ArrowRight size={24} />
                            </button>
                        </div>
                    </div>
                );
            }

            if (isSubmitted) {
                return (
                    <div className="min-h-screen bg-[#343a40] flex items-center justify-center p-4">
                        <div className="bg-white w-full max-w-xl rounded-xl shadow-2xl p-12 text-center">
                            <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6"><Check className="text-[#00E581]" size={40} /></div>
                            <h1 className="text-2xl font-bold text-slate-800 mb-4">Inscrição Confirmada!</h1>
                            <p className="text-slate-600 mb-8">Obrigado! Fique atento ao seu WhatsApp para as próximas instruções.</p>
                            <button onClick={() => window.location.reload()} className="text-blue-600 font-semibold hover:underline">Voltar ao início</button>
                        </div>
                    </div>
                );
            }

            const stepData = steps[currentStep];

            return (
                <div className="min-h-screen bg-[#343a40] flex flex-col font-sans overflow-x-hidden">
                    <div className="absolute top-6 left-6"><img src={LOGO_URL} alt="Logo" className="h-8" /></div>

                    <main className="flex-1 flex items-center justify-center p-4 mt-8">
                        <div className="w-full max-w-2xl bg-white rounded-md shadow-2xl overflow-hidden flex flex-col min-h-[400px]">
                            <div className="flex-1 p-10 md:p-14 flex flex-col items-center justify-center text-center">
                                <h2 className="text-[22px] md:text-2xl text-slate-800 mb-2 font-normal">
                                    {stepData.title}{!stepData.optional && <span className="text-red-500 ml-1">*</span>}
                                </h2>
                                {stepData.subtitle && <p className="text-slate-500 mb-8 text-sm md:text-base">{stepData.subtitle}</p>}

                                <div className={`w-full ${stepData.subtitle ? 'mt-2' : 'mt-8'}`} onKeyDown={handleKeyDown}>
                                    
                                    {/* Nomes (First Name / Last Name) */}
                                    {stepData.type === 'name' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {stepData.fields.map(f => (
                                                <div key={f.name} className="text-left">
                                                    <input 
                                                        type="text" 
                                                        name={f.name} 
                                                        value={formData[f.name]} 
                                                        onChange={handleInputChange} 
                                                        placeholder={f.placeholder}
                                                        autoFocus={f.name === 'firstName'} 
                                                        className={`w-full border p-3 rounded-sm text-[15px] outline-none transition-colors ${errors[f.name] ? 'border-red-500 bg-red-50 focus:border-red-600' : 'border-slate-300 focus:border-blue-400'}`} 
                                                    />
                                                    <label className="text-[11px] text-slate-400 mt-1 block font-medium uppercase tracking-wide">{f.label}</label>
                                                    {errors[f.name] && <span className="text-[11px] text-red-500 mt-1 block font-medium">{errors[f.name]}</span>}
                                                </div>
                                            ))}
                                        </div>
                                    )}

                                    {/* Input Único (Email, Phone, Text, Number) */}
                                    {stepData.type === 'input' && (
                                        <div className="text-left">
                                            <input 
                                                type={stepData.inputType} 
                                                name={stepData.name} 
                                                value={formData[stepData.name]} 
                                                onChange={handleInputChange} 
                                                placeholder={stepData.placeholder}
                                                autoFocus 
                                                className={`w-full border p-3 rounded-sm text-[15px] outline-none transition-colors ${errors[stepData.name] ? 'border-red-500 bg-red-50 focus:border-red-600' : 'border-slate-300 focus:border-blue-400'}`} 
                                            />
                                            {stepData.sublabel && <label className="text-[11px] text-slate-400 mt-1 block italic">{stepData.sublabel}</label>}
                                            {errors[stepData.name] && <span className="text-[11px] text-red-500 mt-1 block font-medium">{errors[stepData.name]}</span>}
                                        </div>
                                    )}

                                    {/* Múltipla Escolha (Checkboxes) */}
                                    {stepData.type === 'checkbox' && (
                                        <div className="space-y-3 text-left">
                                            {stepData.options.map((opt, i) => {
                                                const active = formData[stepData.name]?.includes(opt);
                                                return (
                                                    <button key={i} onClick={() => handleCheckboxChange(opt, stepData.name)} className={`w-full flex items-center gap-4 p-4 border rounded-lg text-left transition-all ${active ? 'border-[#00E581] bg-emerald-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                                        <div className={`w-6 h-6 rounded flex items-center justify-center border-2 ${active ? 'bg-[#00E581] border-[#00E581]' : 'bg-white border-slate-300'}`}>{active && <Check size={14} className="text-white" strokeWidth={4} />}</div>
                                                        <span className={`text-[15px] ${active ? 'text-emerald-900 font-medium' : 'text-slate-600'}`}>{opt}</span>
                                                    </button>
                                                );
                                            })}
                                            {errors[stepData.name] && <div className="text-[12px] text-red-500 mt-2 font-medium">{errors[stepData.name]}</div>}
                                        </div>
                                    )}

                                    {/* Escolha Única (Radios) */}
                                    {stepData.type === 'radio' && (
                                        <div className="space-y-3 text-left">
                                            {stepData.options.map((opt, i) => {
                                                const val = opt.value || opt;
                                                const label = opt.label || opt;
                                                const active = formData[stepData.name] === val;
                                                return (
                                                    <button key={i} onClick={() => handleRadioChange(val, stepData.name)} className={`w-full flex items-center gap-4 p-4 border rounded-lg text-left transition-all ${active ? 'border-[#00E581] bg-emerald-50' : 'border-slate-200 hover:border-slate-300'}`}>
                                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center border-2 ${active ? 'border-[#00E581]' : 'border-slate-300'}`}>{active && <div className="w-2.5 h-2.5 rounded-full bg-[#00E581]" />}</div>
                                                        <span className="text-[15px] flex-1 text-slate-700">{label}</span>
                                                    </button>
                                                );
                                            })}
                                            {errors[stepData.name] && <div className="text-[12px] text-red-500 mt-2 font-medium">{errors[stepData.name]}</div>}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Rodapé de Navegação */}
                            <div className="flex bg-[#00E581] h-14">
                                <div className="flex-1 border-r border-[#00000015] flex">
                                    {currentStep > 0 && (
                                        <button onClick={prevStep} className="w-full h-full text-white font-semibold text-[13px] uppercase tracking-widest hover:bg-black/5 flex items-center justify-center gap-2 transition-all">
                                            <ArrowLeft size={16} /> ANTERIOR
                                        </button>
                                    )}
                                </div>
                                <div className="flex-1 flex">
                                    <button onClick={nextStep} disabled={isSubmitting} className="w-full h-full text-white font-semibold text-[13px] uppercase tracking-widest hover:bg-black/5 transition-all flex items-center justify-center gap-2">
                                        {isSubmitting ? 'ENVIANDO...' : currentStep === totalSteps - 1 ? 'ENVIAR' : 'PRÓXIMO'} 
                                        <ArrowRight size={16} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Barra de Progresso e Dots */}
                    <footer className="p-8 flex flex-col items-center gap-6">
                        <div className="flex items-center w-full max-w-lg relative px-4">
                            <div className="absolute h-[1px] bg-white/20 w-full top-1/2 left-0 -translate-y-1/2 -z-10"></div>
                            <div className="flex justify-between w-full">
                                {steps.map((_, idx) => {
                                    const isCurrent = idx === currentStep;
                                    const isFilled = isStepComplete(idx);
                                    const isNextFocus = idx === currentStep + 1 && !isFilled;
                                    
                                    let dotStyle = "bg-slate-400 w-2 h-2";
                                    if (isCurrent) dotStyle = "bg-blue-400 w-3.5 h-3.5 ring-2 ring-white ring-offset-2 ring-offset-[#343a40]";
                                    else if (isFilled) dotStyle = "bg-[#00E581] w-2.5 h-2.5";
                                    else if (isNextFocus) dotStyle = "bg-red-400 w-2 h-2";

                                    return (
                                        <div key={idx} className="relative group flex items-center justify-center">
                                            <div className={`${dotStyle} rounded-full transition-all duration-300 cursor-pointer`} onClick={() => idx < currentStep && setCurrentStep(idx)} />
                                            {isCurrent && (
                                                <div className="absolute -top-12 bg-[#212529] text-white text-[10px] py-1.5 px-3 rounded shadow-2xl border border-white/5 whitespace-nowrap z-20">
                                                    {idx + 1}. {steps[idx].title}
                                                    <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-[#212529] rotate-45"></div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="bg-[#212529] text-white/70 px-4 py-1.5 rounded text-[11px] font-bold tracking-widest uppercase shadow-sm">
                            {currentStep + 1} de {totalSteps}
                        </div>
                    </footer>
                </div>
            );
        };

        // Renderiza a aplicação no root
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
